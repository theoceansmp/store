<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean SMP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Redirect after 4 seconds -->
<meta http-equiv="refresh" content="4; url=https://oceansmp.mcsets.com">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #0a1f2d, #02070c);
  overflow: hidden;
  color: white;
}

/* Background glow */
.bg {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #00cfff55, transparent 70%);
  filter: blur(120px);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0);}
  50% { transform: translateY(-40px);}
}

/* Glass card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 25px;
  padding: 50px 60px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: fadeIn 1s ease;
  max-width: 400px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* Logo */
.logo {
  width: 120px;
  margin-bottom: 20px;
  animation: spinSlow 8s linear infinite;
}

@keyframes spinSlow {
  from { transform: rotate(0deg);}
  to { transform: rotate(360deg);}
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 25px;
}

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  transition: 0.3s;
}

.store {
  background: linear-gradient(135deg, #00cfff, #007bff);
}

.store:hover {
  transform: scale(1.05);
}

.discord {
  background: rgba(255,255,255,0.1);
}

.discord:hover {
  background: rgba(255,255,255,0.2);
}

/* Loader */
.loader {
  margin-top: 20px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top: 3px solid white;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: auto;
  margin-right: auto;
}

@keyframes spin {
  to { transform: rotate(360deg);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
  <img src="logo.png" class="logo">

  <h1>Ocean SMP</h1>
  <p>Welcome! Redirecting you to the official store...</p>

  <a href="https://oceansmp.mcsets.com" class="btn store">🛒 Go to Store</a>
  <a href="https://dsc.gg/theoceansmp" class="btn discord">💬 Join Discord</a>

  <div class="loader"></div>
</div>

</body>
</html>
